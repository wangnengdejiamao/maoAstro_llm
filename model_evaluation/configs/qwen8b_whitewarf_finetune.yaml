# Qwen-8B 白矮星领域专用微调配置
# 侧重: 单白矮星、双白矮星、磁性白矮星、吸积白矮星

model_name_or_path: Qwen/Qwen2.5-7B-Instruct  # 或 Qwen3-8B
template: qwen

# ==================== 数据配置 ====================
dataset_dir: ../data/white_dwarf_papers
dataset: 
  - wd_training_data      # 白矮星专用训练数据
  - wd_anti_hallucination # 反幻觉数据
  - wd_calculations       # 计算题数据

cutoff_len: 8192
max_samples: 10000000
overwrite_cache: true
preprocessing_num_workers: 16

# ==================== 输出配置 ====================
output_dir: ../models/qwen8b-whitewarf-v1
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

# ==================== 阶段 1: 持续预训练 (CPT) ====================
# 使用白矮星文献进行领域适应

### CPT 配置 ###
# stage: pt
# 数据来源:
#   - arXiv 白矮星相关论文 (2020-2025)
#   - 白矮星综述文章
#   - 专业书籍章节

lora_target: all
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

# CPT 训练参数
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.5e-5  # 白矮星专用: 略低学习率保持稳定性
num_train_epochs: 4
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

optim: adamw_torch
weight_decay: 0.1

# ==================== 阶段 2: 监督微调 (SFT) ====================
# 白矮星专用问答对微调

### SFT 配置 ###
# stage: sft
# 数据来源:
#   - Kimi 生成的高质量 QA 对
#   - 反幻觉训练数据
#   - 计算题和推导题
#   - 概念解释数据

# LoRA 配置 (SFT) - 更大秩以学习专业术语
# lora_rank: 128
# lora_alpha: 256

# SFT 训练参数
# learning_rate: 4e-5
# num_train_epochs: 4
# 注意: 白矮星领域数据量相对较小，需要更多 epoch

# ==================== 特殊配置 ====================

# 白矮星领域特殊参数
# 使用较小的学习率和更多的 epoch，因为:
# 1. 领域数据相对集中，过拟合风险较低
# 2. 需要精确记忆定量数据（质量、温度、磁场等）
# 3. 专业术语需要准确掌握

# 数据混合权重 (用于多数据集训练)
dataset_mixer:
  wd_training_data: 0.5
  wd_anti_hallucination: 0.3
  wd_calculations: 0.2

# ==================== RLHF (可选阶段 3) ====================
# 使用 DPO 进一步优化白矮星回答质量

### DPO 配置 ###
# stage: dpo
# 偏好数据:
#   - chosen: 准确、详细的白矮星解释
#   - rejected: 模糊或有误的解释

# ==================== 评估配置 ====================
eval_dataset: wd_eval
eval_steps: 500
eval_strategy: steps
load_best_model_at_end: true
metric_for_best_model: accuracy
greater_is_better: true

# ==================== 推理配置 ====================
# 白矮星领域推理参数推荐
inference:
  temperature: 0.3  # 较低温度以保持准确性
  top_p: 0.9
  max_new_tokens: 2048
  repetition_penalty: 1.1
  
  # 系统提示词
  system_prompt: |
    你是白矮星天体物理学专家，专门研究：
    - 单白矮星演化、冷却和质量测定
    - 双白矮星系统、轨道演化和引力波辐射
    - 磁性白矮星分类、磁场产生和观测特征
    - 吸积白矮星、激变变星和新星爆发
    
    回答要求：
    1. 使用精确的天文术语
    2. 提供定量数据（数值、单位、误差范围）
    3. 区分不同类型的白矮星系统
    4. 避免常见误解（如 AM CVn 不含中子星）
    5. 对不确定的内容明确说明

# ==================== 运行命令 ====================

## 完整训练流程

### Step 0: 准备数据
# python download_wd_papers.py --search --max-results 100 --generate-data --use-kimi

### Step 1: 持续预训练
# llamafactory-cli train \
#   --stage pt \
#   --model_name_or_path Qwen/Qwen2.5-7B-Instruct \
#   --do_train \
#   --dataset wd_cpt_data \
#   --finetuning_type lora \
#   --lora_target all \
#   --lora_rank 64 \
#   --lora_alpha 128 \
#   --output_dir ./models/qwen8b-whitewarf-cpt \
#   --per_device_train_batch_size 4 \
#   --gradient_accumulation_steps 4 \
#   --learning_rate 1.5e-5 \
#   --num_train_epochs 4 \
#   --lr_scheduler_type cosine \
#   --warmup_ratio 0.1 \
#   --logging_steps 10 \
#   --save_steps 500 \
#   --bf16 \
#   --plot_loss

### Step 2: 监督微调
# llamafactory-cli train \
#   --stage sft \
#   --model_name_or_path Qwen/Qwen2.5-7B-Instruct \
#   --adapter_name_or_path ./models/qwen8b-whitewarf-cpt \
#   --do_train \
#   --dataset wd_training_data \
#   --finetuning_type lora \
#   --lora_target all \
#   --lora_rank 128 \
#   --lora_alpha 256 \
#   --output_dir ./models/qwen8b-whitewarf-sft \
#   --per_device_train_batch_size 4 \
#   --gradient_accumulation_steps 4 \
#   --learning_rate 4e-5 \
#   --num_train_epochs 4 \
#   --lr_scheduler_type cosine \
#   --warmup_ratio 0.1 \
#   --logging_steps 10 \
#   --save_steps 500 \
#   --bf16 \
#   --plot_loss

### Step 3: 合并导出
# llamafactory-cli export \
#   --model_name_or_path Qwen/Qwen2.5-7B-Instruct \
#   --adapter_name_or_path ./models/qwen8b-whitewarf-sft \
#   --finetuning_type lora \
#   --template qwen \
#   --export_dir ./models/qwen8b-whitewarf-final \
#   --export_size 2 \
#   --export_device cpu

### Step 4: 评估
# python run_wd_eval.py --model ./models/qwen8b-whitewarf-final --interface hf
